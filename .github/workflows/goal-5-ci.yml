name: myMEDLIFE CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  app-checks:
    name: App checks
    runs-on: ubuntu-latest
    env:
      HAS_CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN != '' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.0.7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test with coverage
        run: pnpm test:coverage

      - name: Upload coverage to Codecov
        if: ${{ env.HAS_CODECOV_TOKEN == 'true' }}
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: true

      - name: Upload coverage for SonarQube Cloud
        uses: actions/upload-artifact@v4
        with:
          name: sonar-coverage
          path: coverage/lcov.info
          retention-days: 7

      - name: Build
        run: pnpm build

  browser-smoke:
    name: Browser smoke tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.0.7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium for Playwright
        run: pnpm exec playwright install chromium

      - name: Run browser smoke tests
        run: pnpm e2e

      - name: Upload Playwright report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  supabase-rls:
    name: Supabase RLS tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.106.0
          github-token: ${{ github.token }}

      - name: Start local Supabase
        run: supabase start

      - name: Reset database with seed data
        run: supabase db reset

      - name: Run pgTAP RLS tests
        run: supabase test db

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup

  sonarqube-cloud:
    name: SonarQube Cloud
    runs-on: ubuntu-latest
    needs:
      - app-checks
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure SonarQube Cloud for CI analysis
        uses: xmidt-org/sonarcloud-project-config@v1
        with:
          create-missing-project: false
          sonarcloud-org: ${{ vars.SONAR_ORGANIZATION }}
          analysis-mode: ci
          sonar-token: ${{ secrets.SONAR_TOKEN }}

      - name: Download coverage for SonarQube Cloud
        uses: actions/download-artifact@v4
        with:
          name: sonar-coverage
          path: coverage

      - name: SonarQube Cloud scan
        uses: SonarSource/sonarqube-scan-action@v7.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
